<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scalable Node.js Docker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(120, 140, 255, 0.18) 0%, transparent 45%),
        radial-gradient(circle at 90% 10%, rgba(88, 210, 255, 0.16) 0%, transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(168, 92, 255, 0.18) 0%, transparent 45%),
        linear-gradient(120deg, #0b0f1a 0%, #0a1226 45%, #0c1020 100%);
      background-size: 200% 200%;
      animation: bgShift 14s ease-in-out infinite;
      color: #e6e8f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .container {
      background:
        linear-gradient(160deg, rgba(18, 24, 48, 0.96) 0%, rgba(10, 14, 28, 0.96) 100%);
      border: 1px solid rgba(120, 135, 255, 0.18);
      border-radius: 22px;
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(100, 130, 255, 0.12) inset;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      animation: slideIn 0.6s ease-out;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .container::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: conic-gradient(
        from 180deg at 50% 50%,
        rgba(90, 210, 255, 0.12),
        rgba(130, 110, 255, 0.14),
        rgba(255, 110, 200, 0.10),
        rgba(90, 210, 255, 0.12)
      );
      opacity: 0.35;
      filter: blur(40px);
      animation: glowSpin 18s linear infinite;
      z-index: 0;
    }
    .container > * {
      position: relative;
      z-index: 1;
    }
    @keyframes glowSpin {
      to { transform: rotate(1turn); }
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h1 {
      color: #c8d4ff;
      font-size: 2.5em;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 0.5px;
      text-shadow: 0 8px 24px rgba(100, 130, 255, 0.35);
    }
    .emoji {
      font-size: 3em;
      text-align: center;
      margin: 20px 0;
      animation: bounce 2.6s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(90, 210, 255, 0.35));
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .card {
      background: linear-gradient(135deg, rgba(30, 38, 70, 0.92) 0%, rgba(14, 18, 36, 0.95) 100%);
      border-radius: 16px;
      padding: 25px;
      margin: 20px 0;
      border: 1px solid rgba(124, 155, 255, 0.22);
      border-left: 5px solid #7c9bff;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
      border-color: rgba(140, 190, 255, 0.35);
    }
    .card h2 {
      color: #e0e6ff;
      font-size: 1.5em;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .info-item {
      background: linear-gradient(160deg, rgba(12, 18, 34, 0.95), rgba(8, 12, 26, 0.92));
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(100, 130, 210, 0.22);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }
    .info-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(120, 200, 255, 0.12) 45%, transparent 100%);
      transform: translateX(-120%);
      animation: shimmer 6s ease-in-out infinite;
      pointer-events: none;
    }
    .info-item:hover {
      transform: translateY(-4px);
      border-color: rgba(120, 200, 255, 0.45);
    }
    @keyframes shimmer {
      0%, 60% { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }
    .info-item label {
      display: block;
      color: #9aa6c7;
      font-size: 0.82em;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      margin-bottom: 6px;
    }
    .info-item value {
      display: block;
      color: #f1f3ff;
      font-size: 1.1em;
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #4f6cff 0%, #7b5cff 50%, #5bd0ff 100%);
      color: #f4f6ff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      margin: 5px;
      box-shadow: 0 8px 18px rgba(79, 108, 255, 0.35);
      position: relative;
      overflow: hidden;
    }
    .badge::after {
      content: "";
      position: absolute;
      inset: -100% 0 0 0;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 60%);
      animation: badgePulse 3s ease-in-out infinite;
      opacity: 0.55;
    }
    @keyframes badgePulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(60%); }
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #a4b0d1;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Scalable Node.js Docker</h1>
    <div class="emoji">{{EMOJI}}</div>

    <div class="card">
      <h2>🐳 Server Information</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Hostname</label>
          <value>{{HOSTNAME}}</value>
        </div>
        <div class="info-item">
          <label>Container ID</label>
          <value>{{CONTAINER_ID}}</value>
        </div>
        <div class="info-item">
          <label>Platform</label>
          <value>{{PLATFORM}}</value>
        </div>
        <div class="info-item">
          <label>Architecture</label>
          <value>{{ARCH}}</value>
        </div>
        <div class="info-item">
          <label>Node Version</label>
          <value>{{NODE_VERSION}}</value>
        </div>
        <div class="info-item">
          <label>Uptime</label>
          <value>{{UPTIME}} min</value>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📊 Request Details</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Method</label>
          <value>{{METHOD}}</value>
        </div>
        <div class="info-item">
          <label>Path</label>
          <value>{{PATH}}</value>
        </div>
        <div class="info-item">
          <label>Timestamp</label>
          <value>{{TIMESTAMP}}</value>
        </div>
      </div>
    </div>

    <div class="footer">
      <div>
        <span class="badge">Node.js</span>
        <span class="badge">Docker</span>
        <span class="badge">Express</span>
      </div>
      <p style="margin-top: 15px;">Powered by Node.js & Docker 🔥</p>
    </div>
  </div>
</body>
</html>
